[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"

# Monad uses the Pectra fork
evm_version = "prague"

# Optimizer on — standard for production
optimizer       = true
optimizer_runs  = 200


[profile.testnet]
eth-rpc-url = "https://testnet-rpc.monad.xyz"
chain_id    = 10143

[profile.mainnet]
eth-rpc-url = "https://rpc.monad.xyz"
chain_id    = 143

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
monad_mainnet = "https://rpc.monad.xyz"

[etherscan]
# Verification via Sourcify (MonadVision)
monad_testnet = { key = "placeholder", url = "https://sourcify-api-monad.blockvision.org" }
monad_mainnet = { key = "placeholder", url = "https://sourcify-api-monad.blockvision.org" }

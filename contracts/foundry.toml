[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"

# Pin compiler for reproducible builds + explorer verification
solc_version = "0.8.28"

# Monad uses the Pectra fork
evm_version = "prague"

# Optimizer on — standard for production
optimizer       = true
optimizer_runs  = 200

# IPFS bytecode hash helps Sourcify match deployed bytecode (see Monad docs)
bytecode_hash = "ipfs"


[profile.testnet]
eth-rpc-url = "https://testnet-rpc.monad.xyz"
chain_id    = 10143

[profile.mainnet]
eth-rpc-url = "https://rpc.monad.xyz"
chain_id    = 143

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
monad_mainnet = "https://rpc.monad.xyz"

